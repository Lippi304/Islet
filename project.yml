# XcodeGen recipe for the Islet app.
# This is the single source of truth for the Xcode project: regenerate the
# .xcodeproj at any time with `xcodegen generate`. Source files are discovered
# from the `Islet/` folder, so adding a new .swift file there and regenerating
# automatically includes it in the build.
name: Islet
options:
  bundleIdPrefix: com.lippi304
  deploymentTarget:
    # D-06 originally set this to 14.0 (notch Macs are recent). Bumped to 15.0 during
    # Phase 26 round-6 on-device UAT: fixing a real bug (Settings window auto-reappearing
    # at launch via AppKit's own window-state restoration, independent of AppDelegate's
    # logic) requires `.defaultLaunchBehavior(.suppressed)` (macOS 15+ only), and SwiftUI's
    # `SceneBuilder` has no `if #available`/type-eraser path to keep this optional -- it's
    # this API or nothing. Zero real 14.0 users yet (pre-release), and the dev's own
    # hardware is already macOS 26, so this is a safe floor to move now.
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Phase-4 (Now Playing): the MediaRemote bridge. The repo has ZERO git tags, so
# `from:`/`majorVersion:` will NOT resolve (Pitfall 4) — pin a known-good commit by
# `revision:` for a reproducible, supply-chain-safe build (T-04-01).
packages:
  MediaRemoteAdapter:
    url: https://github.com/ejbills/mediaremote-adapter
    revision: cf30c4f1af29b5829d859f088f8dbdf12611a046   # no tags exist — pin a known-good commit
  # Phase 40 / HUD-06: Sparkle has real git tags (unlike MediaRemoteAdapter) — pin a
  # version with `from:` for a reproducible, supply-chain-safe build.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4

# Build settings applied to every target.
settings:
  base:
    SWIFT_VERSION: "5.0"             # D/Pitfall 2: Swift 5 LANGUAGE MODE (avoid Swift 6 strict concurrency)
    MACOSX_DEPLOYMENT_TARGET: "15.0" # D-06 (bumped from 14.0, Phase 26 round 6 — see deploymentTarget comment above)
    ENABLE_HARDENED_RUNTIME: YES     # required later for notarization — keep on
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "R7AGU84UX7"    # real Apple Developer Team (Pitfall 1 fix — WeatherKit needs a real entitled identity, not ad-hoc)
    DEAD_CODE_STRIPPING: YES

targets:
  Islet:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Islet
    # Phase 40 / HUD-06 (D-01/D-02/D-03/D-09/D-10) — Sparkle's 3 required Info.plist keys are
    # THIRD-PARTY keys Xcode's INFOPLIST_KEY_* synthesis mechanism does not recognize (verified:
    # they never appear in the built Info.plist even though GENERATE_INFOPLIST_FILE: YES is set
    # and other INFOPLIST_KEY_* entries like NSFocusStatusUsageDescription synthesize correctly —
    # RESEARCH.md Open Question 1's predicted contingency). Merge them via XcodeGen's `info:`
    # literal-plist-merge feature instead (combines with GENERATE_INFOPLIST_FILE synthesis, a
    # documented Xcode 13+ capability, not currently used elsewhere in this project).
    info:
      path: Islet/Info-Sparkle.plist
      properties:
        # SUFeedURL: real feed, hosted directly from this repo via raw.githubusercontent.com —
        # no separate hosting account/domain needed (D-01's original "Vercel domain" plan was
        # never set up; this is simpler for a hobby project with zero added cost). Updated by
        # scripts/release.sh's appcast step on every release; see docs/RELEASE.md.
        SUFeedURL: "https://raw.githubusercontent.com/Lippi304/Islet/main/docs/appcast.xml"
        # SUPublicEDKey: the real EdDSA public key generated by Sparkle's `generate_keys` tool
        # (private key lives ONLY in this machine's login Keychain — D-03, never in this repo).
        SUPublicEDKey: "JYBHqB8rCAHLwr0HEvATFYYAOu4E/ETYywICdhQQAxs="
        # D-09/D-12: MUST be an explicit Info.plist key — setting
        # updater.automaticallyChecksForUpdates in Swift alone does NOT suppress Sparkle's own
        # unprompted permission alert on the app's second launch (RESEARCH.md Pitfall 1).
        SUEnableAutomaticChecks: true
    dependencies:
      - package: MediaRemoteAdapter
        product: MediaRemoteAdapter
        embed: true        # Embed & Sign — the framework is a RUNTIME resource (run.pl lives inside it), not just link-time. Pitfall 3: omitting → Bundle.module/run.pl resolve to nothing → silent no-op.
        codeSign: true     # codeSignOnCopy — required for hardened-runtime + later notarization
      # Phase 40 / HUD-06: identical embed+codeSign shape to MediaRemoteAdapter above — Sparkle
      # is also a runtime resource. No new entitlement needed: disable-library-validation is
      # already project-wide (added for MediaRemoteAdapter) and covers this embedded framework too.
      - package: Sparkle
        product: Sparkle
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lippi304.islet  # D-08: exact lowercase bundle id
        PRODUCT_NAME: Islet
        INFOPLIST_KEY_LSUIElement: YES                 # APP-01: menu-bar agent, no Dock icon
        INFOPLIST_KEY_CFBundleDisplayName: Islet       # D-07: display name
        # Phase 6 / DEV-01 — A1 VERDICT RESOLVED: on macOS 26 the FIRST IOBluetooth API call
        # (register(forConnectNotifications:)) requires this usage key — without it the app HARD
        # CRASHES ("attempted to access privacy-sensitive data without a usage description"),
        # which also took down the test runner. The key is therefore REQUIRED (not speculative).
        # German string to match the app's user-facing locale (cf. "Now Playing nicht verfügbar").
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Islet zeigt eine kurze Mitteilung in der Notch, wenn ein Bluetooth-Gerät wie deine AirPods verbunden oder getrennt wird."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Islet zeigt das aktuelle Wetter in der Notch an, sobald du deinen Standort einmalig freigibst."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Islet zeigt dein naechstes anstehendes Kalenderereignis in der Notch an."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Islet zeigt dein naechstes anstehendes Kalenderereignis in der Notch an."
        # Phase 28 / D-05 — both Reminders keys are required together (Pitfall 2): adding only
        # one silently breaks first-touch access.
        INFOPLIST_KEY_NSRemindersUsageDescription: "Islet legt eine neue Erinnerung an, wenn du das im Kalender-Schnellzugriff auswaehlst."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Islet legt eine neue Erinnerung an, wenn du das im Kalender-Schnellzugriff auswaehlst."
        # Phase 24 / SHELF-01/02 (D-10) — defensive/inert-if-unused: Accessibility (not this key)
        # is what actually gates DropInterceptTap's CGEventTap creation (Assumption A6, confirmed
        # on-device), but some sources suggest an Accessibility-trusted app also gets Input
        # Monitoring "for free," so both TCC entries may show up. There is no Accessibility
        # equivalent Info.plist usage-description key for this API — do not add one.
        INFOPLIST_KEY_NSInputMonitoringUsageDescription: "Islet nutzt diese Berechtigung, um beim Ablegen einer Datei in der Notch zu verhindern, dass Finder die Originaldatei verschiebt."
        # Phase 38 / HUD-05 (38-09 gap closure) — same class of gap as the Bluetooth key above:
        # INFocusStatusCenter.requestAuthorization/.authorizationStatus HARD CRASHES without this
        # key ("attempted to access privacy-sensitive data without a usage description").
        INFOPLIST_KEY_NSFocusStatusUsageDescription: "Islet zeigt eine kurze Mitteilung in der Notch an, wenn du deinen Fokus- oder Nicht-stoeren-Status aenderst."
        # Phase 49 — Automation (Apple Events) usage key: required alongside the
        # com.apple.security.automation.apple-events entitlement (Islet.entitlements) before
        # Islet's own binary can send any AppleScript/Apple Event under Hardened Runtime.
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Islet fragt diese Berechtigung an, um den aktuellen Titel als Favorit zu markieren."
        # D-10: no INFOPLIST_KEY_SUScheduledCheckInterval — Sparkle's own ~24h default is used.
        GENERATE_INFOPLIST_FILE: YES                   # modern Xcode: synthesize Info.plist from build settings
        MARKETING_VERSION: "2.0"                       # -> CFBundleShortVersionString (v2.0 — Shelf, Architecture Redesign, Liquid Glass/HUDs, Settings Redesign, Clipboard History since 1.2.1)
        CURRENT_PROJECT_VERSION: "5"                   # -> CFBundleVersion (build number, incremented per release)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO                         # un-sandboxed (needed for later MediaRemote/IOKit work)
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
        # BLOCKER fix (260705-mzj): embedded MediaRemoteAdapter.framework fails Library
        # Validation under Hardened Runtime (app + framework ad-hoc signed → different Team
        # IDs → dyld rejects the mapping, crashing every Release launch on Tahoe). Opt out of
        # library validation for the embedded third-party framework. Minimal surface: this is
        # the ONLY entitlement; sandbox stays off, hardened runtime stays on for notarization.
        CODE_SIGN_ENTITLEMENTS: Islet/Islet.entitlements
    # Phase 40 / HUD-06 blocking-build fix: Xcode 26.6's `-scheme` build planner synthesizes an
    # internal (not present anywhere in the .pbxproj) "Copy Frameworks/Sparkle -> Products/Debug/
    # Sparkle" task for Sparkle's prebuilt xcframework binaryTarget product — unlike
    # MediaRemoteAdapter (a SOURCE package SwiftPM compiles itself, .library(type: .dynamic)
    # EXPLICIT), Sparkle's product type is .automatic, which this toolchain loses track of when
    # planning that internal copy, dropping the ".framework" suffix from both the source and
    # destination path, causing "no such file"/ENOENT on every `-scheme` build. `-project -target
    # Islet` builds (bypassing scheme/workspace build planning) never hit this, confirming a
    # toolchain bug, not a project.yml misconfiguration — ruled out via clean-DerivedData
    # reproduction across EAGER_LINKING / SWIFT_ENABLE_EXPLICIT_MODULES / ENABLE_DEBUG_DYLIB /
    # codeSign / ONLY_ACTIVE_ARCH / global SPM caches / IsletTests scheme inclusion — none of
    # those variables changed the failure. The REAL "Embed Frameworks" phase (Sparkle.framework,
    # correctly named/signed) already succeeds independently of this bug.
    # Workaround: pre-stage a real (non-symlink) copy at the bare "Sparkle" path the buggy
    # internal task expects as BOTH its source and its already-satisfied destination, so the
    # task's own dependency-analysis finds its output up to date and skips re-running its broken
    # copy logic — then delete the bare-name copy from inside the app bundle before Xcode's
    # final whole-bundle CodeSign step, since an un-suffixed loose "Sparkle" directory next to
    # the real "Sparkle.framework" fails bundle-format validation during that step.
    prebuildScripts:
      - name: "Workaround: Sparkle SPM embed path bug (stage)"
        # Forces strict list-order execution instead of the New Build System's
        # dependency-graph scheduling — without this, Xcode.app's GUI build (unlike
        # `xcodebuild -scheme` CLI) may run this concurrently with / after the
        # implicit whole-app CodeSign step since the script declares no outputs.
        basedOnDependencyAnalysis: false
        script: |
          set -e
          ARTIFACT_ROOT="${BUILD_DIR%/Build/*}/SourcePackages/artifacts/sparkle"
          SRC=$(find "$ARTIFACT_ROOT" -type d -name "Sparkle.framework" -path "*Sparkle.xcframework*" 2>/dev/null | head -1)
          if [ -n "$SRC" ] && [ -d "$SRC" ]; then
            FW_DIR="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
            mkdir -p "$FW_DIR"
            rm -rf "$FW_DIR/Sparkle"
            ditto "$SRC" "$FW_DIR/Sparkle"
            mkdir -p "${BUILT_PRODUCTS_DIR}"
            rm -rf "${BUILT_PRODUCTS_DIR}/Sparkle"
            ditto "$SRC" "${BUILT_PRODUCTS_DIR}/Sparkle"
            # Xcode.app's GUI build planner (distinct from `xcodebuild -scheme` CLI) ALSO runs an
            # internal "Copy Frameworks/Sparkle-product -> Products/Debug/Sparkle-product" task for
            # the synthesized "Sparkle-product" package-product target, which never actually builds
            # anything on this toolchain. Stage a REAL copy (not an empty marker — that gets copied
            # verbatim into Contents/Frameworks/Sparkle-product and breaks the final whole-app
            # CodeSign step with "code object is not signed at all") so that copy task's own
            # dependency-analysis finds its source already satisfied and no-ops.
            rm -rf "${BUILT_PRODUCTS_DIR}/Sparkle-product"
            ditto "$SRC" "${BUILT_PRODUCTS_DIR}/Sparkle-product"
          fi
    postbuildScripts:
      - name: "Workaround: Sparkle SPM embed path bug (clean up bare-name copy)"
        # Same ordering fix as the prebuild stage script — must run strictly
        # before the implicit whole-app CodeSign step, not just "some time before".
        basedOnDependencyAnalysis: false
        script: |
          set -e
          rm -rf "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle"
          rm -rf "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle-product"
          rm -rf "${BUILT_PRODUCTS_DIR}/Sparkle"
          rm -rf "${BUILT_PRODUCTS_DIR}/Sparkle-product"
          rm -f "${BUILT_PRODUCTS_DIR}/Sparkle-product"

  # Phase-1 Wave-0 unit-test bundle. Hosted in the Islet app so `@testable import
  # Islet` can reach the app's internal symbols (the pure NotchGeometry /
  # DisplayResolver seams). Runs via `xcodebuild test -scheme Islet`.
  IsletTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: IsletTests
    dependencies:
      - target: Islet
    settings:
      base:
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lippi304.IsletTests
        # Host the tests inside the app bundle so @testable import Islet resolves.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Islet.app/Contents/MacOS/Islet"
        BUNDLE_LOADER: "$(TEST_HOST)"

# An explicit, SHARED scheme so `xcodebuild -scheme Islet` resolves
# (written to Islet.xcodeproj/xcshareddata/xcschemes/Islet.xcscheme).
schemes:
  Islet:
    build:
      targets:
        Islet: all
        IsletTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IsletTests
    archive:
      config: Release
