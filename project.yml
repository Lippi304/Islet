# XcodeGen recipe for the Islet app.
# This is the single source of truth for the Xcode project: regenerate the
# .xcodeproj at any time with `xcodegen generate`. Source files are discovered
# from the `Islet/` folder, so adding a new .swift file there and regenerating
# automatically includes it in the build.
name: Islet
options:
  bundleIdPrefix: com.lippi304
  deploymentTarget:
    # D-06 originally set this to 14.0 (notch Macs are recent). Bumped to 15.0 during
    # Phase 26 round-6 on-device UAT: fixing a real bug (Settings window auto-reappearing
    # at launch via AppKit's own window-state restoration, independent of AppDelegate's
    # logic) requires `.defaultLaunchBehavior(.suppressed)` (macOS 15+ only), and SwiftUI's
    # `SceneBuilder` has no `if #available`/type-eraser path to keep this optional -- it's
    # this API or nothing. Zero real 14.0 users yet (pre-release), and the dev's own
    # hardware is already macOS 26, so this is a safe floor to move now.
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Phase-4 (Now Playing): the MediaRemote bridge. The repo has ZERO git tags, so
# `from:`/`majorVersion:` will NOT resolve (Pitfall 4) — pin a known-good commit by
# `revision:` for a reproducible, supply-chain-safe build (T-04-01).
packages:
  MediaRemoteAdapter:
    url: https://github.com/ejbills/mediaremote-adapter
    revision: cf30c4f1af29b5829d859f088f8dbdf12611a046   # no tags exist — pin a known-good commit

# Build settings applied to every target.
settings:
  base:
    SWIFT_VERSION: "5.0"             # D/Pitfall 2: Swift 5 LANGUAGE MODE (avoid Swift 6 strict concurrency)
    MACOSX_DEPLOYMENT_TARGET: "15.0" # D-06 (bumped from 14.0, Phase 26 round 6 — see deploymentTarget comment above)
    ENABLE_HARDENED_RUNTIME: YES     # required later for notarization — keep on
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "R7AGU84UX7"    # real Apple Developer Team (Pitfall 1 fix — WeatherKit needs a real entitled identity, not ad-hoc)
    DEAD_CODE_STRIPPING: YES

targets:
  Islet:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Islet
    dependencies:
      - package: MediaRemoteAdapter
        product: MediaRemoteAdapter
        embed: true        # Embed & Sign — the framework is a RUNTIME resource (run.pl lives inside it), not just link-time. Pitfall 3: omitting → Bundle.module/run.pl resolve to nothing → silent no-op.
        codeSign: true     # codeSignOnCopy — required for hardened-runtime + later notarization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lippi304.islet  # D-08: exact lowercase bundle id
        PRODUCT_NAME: Islet
        INFOPLIST_KEY_LSUIElement: YES                 # APP-01: menu-bar agent, no Dock icon
        INFOPLIST_KEY_CFBundleDisplayName: Islet       # D-07: display name
        # Phase 6 / DEV-01 — A1 VERDICT RESOLVED: on macOS 26 the FIRST IOBluetooth API call
        # (register(forConnectNotifications:)) requires this usage key — without it the app HARD
        # CRASHES ("attempted to access privacy-sensitive data without a usage description"),
        # which also took down the test runner. The key is therefore REQUIRED (not speculative).
        # German string to match the app's user-facing locale (cf. "Now Playing nicht verfügbar").
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Islet zeigt eine kurze Mitteilung in der Notch, wenn ein Bluetooth-Gerät wie deine AirPods verbunden oder getrennt wird."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Islet zeigt das aktuelle Wetter in der Notch an, sobald du deinen Standort einmalig freigibst."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Islet zeigt dein naechstes anstehendes Kalenderereignis in der Notch an."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Islet zeigt dein naechstes anstehendes Kalenderereignis in der Notch an."
        # Phase 28 / D-05 — both Reminders keys are required together (Pitfall 2): adding only
        # one silently breaks first-touch access.
        INFOPLIST_KEY_NSRemindersUsageDescription: "Islet legt eine neue Erinnerung an, wenn du das im Kalender-Schnellzugriff auswaehlst."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Islet legt eine neue Erinnerung an, wenn du das im Kalender-Schnellzugriff auswaehlst."
        # Phase 24 / SHELF-01/02 (D-10) — defensive/inert-if-unused: Accessibility (not this key)
        # is what actually gates DropInterceptTap's CGEventTap creation (Assumption A6, confirmed
        # on-device), but some sources suggest an Accessibility-trusted app also gets Input
        # Monitoring "for free," so both TCC entries may show up. There is no Accessibility
        # equivalent Info.plist usage-description key for this API — do not add one.
        INFOPLIST_KEY_NSInputMonitoringUsageDescription: "Islet nutzt diese Berechtigung, um beim Ablegen einer Datei in der Notch zu verhindern, dass Finder die Originaldatei verschiebt."
        # Phase 38 / HUD-05 (38-09 gap closure) — same class of gap as the Bluetooth key above:
        # INFocusStatusCenter.requestAuthorization/.authorizationStatus HARD CRASHES without this
        # key ("attempted to access privacy-sensitive data without a usage description").
        INFOPLIST_KEY_NSFocusStatusUsageDescription: "Islet zeigt eine kurze Mitteilung in der Notch an, wenn du deinen Fokus- oder Nicht-stoeren-Status aenderst."
        GENERATE_INFOPLIST_FILE: YES                   # modern Xcode: synthesize Info.plist from build settings
        MARKETING_VERSION: "1.0"                       # -> CFBundleShortVersionString (D-14: 1.0 is the public launch)
        CURRENT_PROJECT_VERSION: "1"                   # -> CFBundleVersion (build number)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO                         # un-sandboxed (needed for later MediaRemote/IOKit work)
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
        # BLOCKER fix (260705-mzj): embedded MediaRemoteAdapter.framework fails Library
        # Validation under Hardened Runtime (app + framework ad-hoc signed → different Team
        # IDs → dyld rejects the mapping, crashing every Release launch on Tahoe). Opt out of
        # library validation for the embedded third-party framework. Minimal surface: this is
        # the ONLY entitlement; sandbox stays off, hardened runtime stays on for notarization.
        CODE_SIGN_ENTITLEMENTS: Islet/Islet.entitlements

  # Phase-1 Wave-0 unit-test bundle. Hosted in the Islet app so `@testable import
  # Islet` can reach the app's internal symbols (the pure NotchGeometry /
  # DisplayResolver seams). Runs via `xcodebuild test -scheme Islet`.
  IsletTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: IsletTests
    dependencies:
      - target: Islet
    settings:
      base:
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.lippi304.IsletTests
        # Host the tests inside the app bundle so @testable import Islet resolves.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Islet.app/Contents/MacOS/Islet"
        BUNDLE_LOADER: "$(TEST_HOST)"

# An explicit, SHARED scheme so `xcodebuild -scheme Islet` resolves
# (written to Islet.xcodeproj/xcshareddata/xcschemes/Islet.xcscheme).
schemes:
  Islet:
    build:
      targets:
        Islet: all
        IsletTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IsletTests
    archive:
      config: Release
